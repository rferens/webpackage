name: build
on: [push, pull_request]
jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: "^1.16.6"
      - run: go test -v ./go/...

  js-wbn:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm --prefix ./js/bundle ci
      - run: npm --prefix ./js/bundle run build
      - run: npm --prefix ./js/bundle test

  js-wbn-sign:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm --prefix ./js/sign ci
      - run: npm --prefix ./js/sign run build
      - run: npm --prefix ./js/sign test

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install Prettier and Plugins
        run: |
          npm install prettier@3.5 @ianvs/prettier-plugin-sort-imports --no-save
      - name: Run Prettier Check
        run: |
          FOLDERS=("src/bundle" "src/sign")
          for dir in "${FOLDERS[@]}"; do
            echo "--- Processing $dir ---"
            # 1. Move into the directory
            cd $GITHUB_WORKSPACE/$dir
            
            # 2. Install Prettier + Plugin locally in this subfolder
            # --no-save ensures we don't accidentally modify your package.json
            npm install prettier@3.5 @ianvs/prettier-plugin-sort-imports --no-save
            
            # 3. Run the check
            # We use ./node_modules/.bin/prettier to ensure we use the local version
            ./node_modules/.bin/prettier --check . --ignore-unknown --ignore-path=.prettignore --plugin=@ianvs/prettier-plugin-sort-imports
            
            echo "--- Finished $dir ---"
          done

